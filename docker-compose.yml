services:
  # NEXT_PUBLIC_* values are baked into the image at CI build time (GitHub Actions -> GHCR),
  # so changing imagery/Supabase keys requires a new image build, NOT a compose env change.
  # The published `latest` is built with edition=local and no API keys (keyless imagery +
  # the 14 seeders still work). Runtime (non-NEXT_PUBLIC) env like AUTH_SECRET/DATABASE_URL
  # still apply normally via the `environment`/`env_file` below.
  wwv:
    image: ghcr.io/atvriders/worldwideview:latest
    ports:
      # Host port is overridable (e.g. WWV_HTTP_PORT=3015) to avoid host conflicts on 3000.
      - "${WWV_HTTP_PORT:-3000}:3000"
    volumes:
      - wwv-data:/app/data
      - ./public/plugins-local:/app/public/plugins-local:ro
    env_file:
      - path: .env
        required: false
    environment:
      - "AUTH_SECRET=${AUTH_SECRET:-default_secret_for_local_dev}"
      - "ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY:-local_dev_encryption_key_change_in_prod}"
      - "WWV_DEMO_ADMIN_SECRET=${WWV_DEMO_ADMIN_SECRET:-}"
      - "WWV_BRIDGE_TOKEN=${WWV_BRIDGE_TOKEN:-}"
      - "DATABASE_URL=postgresql://postgres:postgres@db:5432/worldwideview?schema=public"
      # NextAuth v5 rejects non-localhost hosts in production unless the host is trusted.
      # Required when reaching the app by LAN IP / domain (e.g. http://192.168.x.x:3015) — without
      # it, login + session creation fail with "UntrustedHost". (Setup account-creation is DB-only
      # and unaffected, but /login afterwards needs this.)
      - "AUTH_TRUST_HOST=true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: worldwideview
    ports:
      - "${WWV_DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d worldwideview"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s

  wwv-data-engine:
    image: ghcr.io/silvertakana/wwv-data-engine:latest
    command: >
      sh -c "
      echo 'Syncing workspace dependencies...' &&
      if [ -d \"$$SEEDERS_DIR/community\" ]; then cd $$SEEDERS_DIR/community && CI=true pnpm install --ignore-scripts && pnpm -r rebuild better-sqlite3 esbuild; fi &&
      if [ -d \"$$SEEDERS_DIR/private\" ]; then cd $$SEEDERS_DIR/private && CI=true pnpm install --ignore-scripts && pnpm -r rebuild better-sqlite3 esbuild; fi &&
      cd /app && node dist/server.js"
    ports:
      - "${WWV_ENGINE_HOST_PORT:-5000}:5000"
    volumes:
      - ./local-seeders:/app/seeders
    environment:
      - PORT=5000
      - REDIS_URL=redis://wwv-redis:6379
      - SEEDERS_DIR=/app/seeders
      - DB_PATH=/app/data/engine.db
      - WWV_SKIP_WS_AUTH=true
      - NODE_ENV=development
    depends_on:
      wwv-redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - engine

  wwv-redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - engine

networks:
  coolify:
    external: true

volumes:
  wwv-data:
  postgres-data:
